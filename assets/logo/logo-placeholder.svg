<?xml version="1.0" encoding="UTF-8"?>
<!--
  El-Imtiyaz logo placeholder.
  Two stylised figures + sweeping cape silhouette.
  Replace with the actual school logo (image.jpeg) via drag-and-drop in the app.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#349bd4" />
      <stop offset="100%" stop-color="#2b7fb0" />
    </linearGradient>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a98c" />
      <stop offset="100%" stop-color="#836c68" />
    </linearGradient>
  </defs>

  <!-- Background subtle glow -->
  <circle cx="150" cy="150" r="120" fill="url(#brandGrad)" opacity="0.08" />

  <!-- Left head -->
  <circle cx="120" cy="90" r="24" fill="url(#brandGrad)" />

  <!-- Right head -->
  <circle cx="180" cy="110" r="20" fill="url(#warmGrad)" />

  <!-- Left sweeping wing -->
  <path d="M150,150 Q80,120 20,220 Q80,170 150,150 Z" fill="url(#brandGrad)" opacity="0.85" />

  <!-- Right sweeping wing -->
  <path d="M150,150 Q220,130 280,240 Q210,180 150,150 Z" fill="url(#warmGrad)" opacity="0.85" />

  <!-- Center arches -->
  <path d="M150,150 Q110,160 70,240 Q110,190 150,150 Z" fill="#242526" opacity="0.6" />
  <path d="M150,150 Q190,160 230,260 Q190,200 150,150 Z" fill="#242526" opacity="0.6" />

  <!-- E letter overlay -->
  <text x="150" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="48" fill="#eff2f3">E</text>
</svg>
